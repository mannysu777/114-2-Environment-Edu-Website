<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早餐燈號 互動配對遊戲</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-green: #00ff00;
            --neon-yellow: #ffff00;
            --neon-red: #ff004c;
            --text-glow: 0 0 10px rgba(255,255,255,0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            /* 預設深藍色底，確保即使圖片沒抓到也能看到內容 */
            background-color: #051622; 
            
            /* 修正檔名確保與你的 photo.png 一致 */
            background-image: url('photo.png');
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden;
            color: #fff;
        }

        /* 頂部標題 */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 30px 80px 10px 80px;
            z-index: 10;
        }

        .title-text {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--neon-cyan), 0 0 30px var(--neon-cyan);
        }

        /* 主遊戲區塊 */
        .game-container {
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            height: calc(100% - 150px);
            position: relative;
            z-index: 10;
        }

        /* 左側：燈號列表 */
        .lights-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px 30px;
            width: 50%;
            margin-top: 20px;
        }

        .light-row {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: flex-end;
        }

        .light-label {
            font-size: 28px;
            font-weight: bold;
            width: 80px;
            text-align: right;
            pointer-events: none;
        }

        .light-label.yellow { color: #fff; text-shadow: 0 0 15px var(--neon-yellow); }
        .light-label.green { color: #fff; text-shadow: 0 0 15px var(--neon-green); }
        .light-label.red { color: #fff; text-shadow: 0 0 15px var(--neon-red); }

        /* 放置槽 */
        .drop-slot {
            width: 150px;
            height: 75px;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            position: relative;
        }
        .drop-slot.hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5) inset;
        }

        /* 右側：食物網格區 */
        .snacks-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px 30px;
            width: 35%;
            margin-top: 20px;
            align-content: start;
            justify-items: center;
        }

        /* 食物方塊 */
        .snack-item {
            width: 130px;
            height: 75px;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            user-select: none;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        
        /* 科技感裝飾 */
        .snack-item::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            background:
                linear-gradient(to right, var(--neon-cyan) 3px, transparent 3px) 0 0,
                linear-gradient(to bottom, var(--neon-cyan) 3px, transparent 3px) 0 0,
                linear-gradient(to left, var(--neon-cyan) 3px, transparent 3px) 100% 0,
                linear-gradient(to bottom, var(--neon-cyan) 3px, transparent 3px) 100% 0,
                linear-gradient(to right, var(--neon-cyan) 3px, transparent 3px) 0 100%,
                linear-gradient(to top, var(--neon-cyan) 3px, transparent 3px) 0 100%,
                linear-gradient(to left, var(--neon-cyan) 3px, transparent 3px) 100% 100%,
                linear-gradient(to top, var(--neon-cyan) 3px, transparent 3px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 15px 15px;
            pointer-events: none;
        }

        .snack-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            padding: 5px;
            box-sizing: border-box;
        }

        .snack-item:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .drop-slot .snack-item {
            width: 100%;
            height: 100%;
            border: none;
            box-shadow: none;
            background: rgba(255, 255, 255, 0.85);
        }

        /* 檢查按鈕 */
        .check-btn-container {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 20;
        }
        .check-btn-container.show {
            pointer-events: auto;
            opacity: 1;
        }
        .check-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-cyan);
            color: #fff;
            font-size: 26px;
            font-weight: bold;
            padding: 12px 45px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        /* 結算視窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: rgba(10, 20, 30, 0.95);
            border: 2px solid var(--neon-cyan);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px var(--neon-cyan);
            width: 85%;
            max-width: 900px;
        }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .result-item {
            padding: 15px;
            font-size: 20px;
            border-radius: 8px;
            border: 2px solid #fff;
        }
        .result-item.correct { border-color: var(--neon-green); color: var(--neon-green); }
        .result-item.wrong { border-color: var(--neon-red); color: var(--neon-red); }
        
        .retry-btn {
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            padding: 10px 30px;
            font-size: 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .retry-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-text">早餐燈號</div>
        <div class="title-text">對應早餐內容</div>
    </div>

    <div class="game-container">
        <!-- 左側：10個格子 -->
        <div class="lights-panel">
            <div class="light-row"><div class="light-label red">紅燈</div><div class="drop-slot" data-expected="red"></div></div>
            <div class="light-row"><div class="light-label green">綠燈</div><div class="drop-slot" data-expected="green"></div></div>
            <div class="light-row"><div class="light-label red">紅燈</div><div class="drop-slot" data-expected="red"></div></div>
            <div class="light-row"><div class="light-label red">紅燈</div><div class="drop-slot" data-expected="red"></div></div>
            <div class="light-row"><div class="light-label red">紅燈</div><div class="drop-slot" data-expected="red"></div></div>
            <div class="light-row"><div class="light-label red">紅燈</div><div class="drop-slot" data-expected="red"></div></div>
            <div class="light-row"><div class="light-label yellow">黃燈</div><div class="drop-slot" data-expected="yellow"></div></div>
            <div class="light-row"><div class="light-label red">紅燈</div><div class="drop-slot" data-expected="red"></div></div>
            <div class="light-row"><div class="light-label yellow">黃燈</div><div class="drop-slot" data-expected="yellow"></div></div>
            <div class="light-row"><div class="light-label yellow">黃燈</div><div class="drop-slot" data-expected="yellow"></div></div>
        </div>

        <!-- 右側：早餐項目 -->
        <div class="snacks-panel" id="snacks-container">
            <div class="snack-item" draggable="true" data-type="green"><img src="danbing.png" alt="蛋餅"></div>
            <div class="snack-item" draggable="true" data-type="red"><img src="hamburger.png" alt="漢堡"></div>
            <div class="snack-item" draggable="true" data-type="yellow"><img src="bagel.png" alt="貝果"></div>
            <div class="snack-item" draggable="true" data-type="red"><img src="hashbrown.png" alt="薯餅"></div>
            <div class="snack-item" draggable="true" data-type="yellow"><img src="toast.png" alt="吐司"></div>
            <div class="snack-item" draggable="true" data-type="red"><img src="friedchicken.png" alt="卡啦雞堡"></div>
            <div class="snack-item" draggable="true" data-type="red"><img src="pineapple_bread.png" alt="菠蘿麵包"></div>
            <div class="snack-item" draggable="true" data-type="yellow"><img src="radish_cake.png" alt="蘿蔔糕"></div>
            <div class="snack-item" draggable="true" data-type="red"><img src="noodle.png" alt="鐵板麵"></div>
            <div class="snack-item" draggable="true" data-type="red"><img src="hotdog.png" alt="熱狗堡"></div>
        </div>

        <div class="check-btn-container" id="check-btn-wrap">
            <button class="check-btn" onclick="checkMatch()">檢查配對</button>
        </div>
    </div>

    <div class="modal-overlay" id="result-modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title-text">檢測結果</div>
            <div class="result-grid" id="result-grid"></div>
            <button class="retry-btn" onclick="location.reload()">再玩一次</button>
        </div>
    </div>

    <script>
        const snacks = document.querySelectorAll('.snack-item');
        const dropSlots = document.querySelectorAll('.drop-slot');
        const snacksContainer = document.getElementById('snacks-container');
        let draggedItem = null;

        // 打亂順序
        for (let i = snacksContainer.children.length; i >= 0; i--) {
            const randomIndex = Math.floor(Math.random() * i);
            snacksContainer.appendChild(snacksContainer.children[randomIndex]);
        }

        // 拖曳開始
        snacks.forEach(snack => {
            snack.addEventListener('dragstart', function(e) {
                draggedItem = this;
                this.style.opacity = '0.5';
                e.dataTransfer.setData('text/plain', ''); // 修正 Firefox 拖放問題
            });
            snack.addEventListener('dragend', function() {
                this.style.opacity = '1';
                draggedItem = null;
                checkAllSlotsFilled();
            });
        });

        // 放置區邏輯
        dropSlots.forEach(slot => {
            slot.addEventListener('dragover', e => e.preventDefault());
            slot.addEventListener('dragenter', function() { this.classList.add('hover'); });
            slot.addEventListener('dragleave', function() { this.classList.remove('hover'); });
            slot.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('hover');
                if (draggedItem) {
                    if (this.childElementCount > 0) {
                        snacksContainer.appendChild(this.firstElementChild);
                    }
                    this.appendChild(draggedItem);
                    checkAllSlotsFilled();
                }
            });
        });

        // 檢查是否全部放滿
        function checkAllSlotsFilled() {
            let filledCount = 0;
            dropSlots.forEach(slot => { if (slot.childElementCount > 0) filledCount++; });
            const btn = document.getElementById('check-btn-wrap');
            if (filledCount === 10) btn.classList.add('show');
            else btn.classList.remove('show');
        }

        // 點擊檢查按鈕
        function checkMatch() {
            const modal = document.getElementById('result-modal');
            const resultGrid = document.getElementById('result-grid');
            resultGrid.innerHTML = '';
            let allCorrect = true;

            dropSlots.forEach(slot => {
                const item = slot.firstElementChild;
                if (!item) return;
                const expected = slot.getAttribute('data-expected');
                const actual = item.getAttribute('data-type');
                const isCorrect = expected === actual;
                if (!isCorrect) allCorrect = false;

                const res = document.createElement('div');
                res.className = `result-item ${isCorrect ? 'correct' : 'wrong'}`;
                res.innerText = item.querySelector('img').alt;
                resultGrid.appendChild(res);
            });

            document.getElementById('modal-title-text').innerText = allCorrect ? "🎉 全部正確！" : "⚠️ 有些地方放錯囉";
            modal.classList.add('active');
        }
    </script>
</body>
</html>
